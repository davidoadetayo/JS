<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=M+PLUS+Rounded+1c&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container">
      <div class="calculator">
        <div class="dIsland">
        </div>
        <div class="lens"></div>

        <div class="input-container">
          <input type="text" id="display" readonly placeholder="0" />
          <input type="text" id="resultDisplay" readonly placeholder="0" />
        </div>

        <div class="buttons">
          <button class="btn clear">AC</button>
          <button class="btn">C</button>
          <button class="btn">%</button>
          <button class="btn operator">/</button>

          <button class="btn">7</button>
          <button class="btn">8</button>
          <button class="btn">9</button>
          <button class="btn operator">x</button>

          <button class="btn">4</button>
          <button class="btn">5</button>
          <button class="btn">6</button>
          <button class="btn operator">-</button>

          <button class="btn">1</button>
          <button class="btn">2</button>
          <button class="btn">3</button>
          <button class="btn operator">+</button>

          <button class="btn">±</button>
          <button class="btn zero">0</button>
          <button class="btn">.</button>
          <button class="btn equal">=</button>
        </div>

        <div class="bar"></div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
