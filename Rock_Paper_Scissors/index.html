<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description"
    content="Play Rock Paper Scissors online. A simple, fast, and fun game against the computer with live score tracking.">
  <meta name="keywords" content="rock paper scissors, game, online game, javascript game, fun game, browser game">
  <meta name="author" content="David Adetayo">

  <meta name="theme-color" content="#101a35">

  <meta property="og:title" content="Rock Paper Scissors Game">
  <meta property="og:description"
    content="Play Rock Paper Scissors against the computer and track your score in real time.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://davidoadetayo.github.io/JS/Rock_Paper_Scissors/">
  <meta property="og:image" content="https://davidoadetayo.github.io/JS/Rock_Paper_Scissors/preview.jpg">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Rock Paper Scissors Game">
  <meta name="twitter:description" content="Play Rock Paper Scissors online and test your luck against the computer.">
  <meta name="twitter:image" content="https://your-domain.com/preview.png">

  <link rel="stylesheet" href="style.css" />

  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="manifest" href="favicon/site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=M+PLUS+Rounded+1c&family=Stack+Sans+Text:wght@200..700&display=swap"
    rel="stylesheet" />

  <title>Rock Paper Scissors</title>
</head>

<body>
  <div class="scoreboard">
    <div class="title">
      <a href="favicon/JS/Rock_Paper_Scissors/">ROCK<br />PAPER<br />SCISSORS</a>
    </div>

    <div class="score-box">
      <p>SCORE</p>
      <span id="scoreValue">0</span>
    </div>
  </div>

  <div class="game" id="game">
    <div class="choices">
      <svg class="triangle-lines" viewBox="0 0 300 260" preserveAspectRatio="none">
        <line x1="50" y1="220" x2="250" y2="220" />
        <line x1="150" y1="0" x2="250" y2="220" />
        <line x1="150" y1="0" x2="50" y2="220" />
      </svg>

      <button id="rock" class="choice">✊</button>

      <button id="paper" class="choice">✋</button>

      <button id="scissors" class="choice">✌️</button>
    </div>
  </div>

  <div id="resultScreen" class="hidden">
    <div class="result-picks">
      <div>
        <div id="userPick"></div>
        <p>
          YOU<br />
          PICKED
        </p>
      </div>

      <div>
        <div id="housePick"></div>
        <p>HOUSE<br />PICKED</p>
      </div>
    </div>

    <div class="result">
      <h2 id="resultText"></h2>
      <button id="playAgain">PLAY AGAIN</button>
    </div>
  </div>

  <audio id="bg-music" src="game-sound.mp3" loop></audio>

  <script src="script.js"></script>
</body>

</html>
