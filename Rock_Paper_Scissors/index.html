<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=M+PLUS+Rounded+1c&family=Stack+Sans+Text:wght@200..700&display=swap"
      rel="stylesheet"
    />

    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <div class="scoreboard">
      <div class="title">
        <a href="/Rock_Paper_Scissors/">ROCK<br />PAPER<br />SCISSORS</a>
      </div>

      <div class="score-box">
        <p>SCORE</p>
        <span id="scoreValue">0</span>
      </div>
    </div>

    <div class="game" id="game">
      <div class="choices">
        <svg
          class="triangle-lines"
          viewBox="0 0 300 260"
          preserveAspectRatio="none"
        >
          <line x1="50" y1="220" x2="250" y2="220" />
          <line x1="150" y1="0" x2="250" y2="220" />
          <line x1="150" y1="0" x2="50" y2="220" />
        </svg>

        <button id="rock" class="choice">✊</button>

        <button id="paper" class="choice">✋</button>

        <button id="scissors" class="choice">✌️</button>
      </div>
    </div>

    <!-- <button id="resetBtn" class="reset-btn">Reset</button> -->
    <div id="resultScreen" class="hidden">
      <div class="result-picks">
        <div>
          <div id="userPick"></div>
          <p>
            YOU<br />
            PICKED
          </p>
        </div>

        <div>
          <div id="housePick"></div>
          <p>HOUSE<br />PICKED</p>
        </div>
      </div>

      <div class="bottom-row">
        <h2 id="resultText"></h2>
        <button id="playAgain">PLAY AGAIN</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
